<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button Group Fixture</title>
    <link rel="stylesheet" href="../../../src/Weave/styles.css" />
    <style>
      body {
        margin: 0;
        padding: 16px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <!-- Horizontal button group -->
    <div id="group-horizontal" class="weave-button-group">
      <div class="weave-button-group__item">
        <button
          id="btn-h-1"
          class="weave-button weave-button--filled weave-button--medium"
        >
          <span class="weave-button__label">First</span>
        </button>
      </div>
      <div class="weave-button-group__item">
        <button
          id="btn-h-2"
          class="weave-button weave-button--filled weave-button--medium"
        >
          <span class="weave-button__label">Middle</span>
        </button>
      </div>
      <div class="weave-button-group__item">
        <button
          id="btn-h-3"
          class="weave-button weave-button--filled weave-button--medium"
        >
          <span class="weave-button__label">Last</span>
        </button>
      </div>
    </div>

    <!-- Vertical button group -->
    <div
      id="group-vertical"
      class="weave-button-group weave-button-group--vertical"
      style="margin-top: 16px"
    >
      <div class="weave-button-group__item">
        <button
          id="btn-v-1"
          class="weave-button weave-button--filled weave-button--medium"
        >
          <span class="weave-button__label">First</span>
        </button>
      </div>
      <div class="weave-button-group__item">
        <button
          id="btn-v-2"
          class="weave-button weave-button--filled weave-button--medium"
        >
          <span class="weave-button__label">Middle</span>
        </button>
      </div>
      <div class="weave-button-group__item">
        <button
          id="btn-v-3"
          class="weave-button weave-button--filled weave-button--medium"
        >
          <span class="weave-button__label">Last</span>
        </button>
      </div>
    </div>
  </body>
</html>
