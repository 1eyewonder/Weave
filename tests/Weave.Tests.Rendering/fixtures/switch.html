<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Switch Fixture</title>
    <link rel="stylesheet" href="../../../src/Weave/styles.css" />
    <style>
      body {
        margin: 0;
        padding: 16px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <!-- Unchecked switch: thumb at left (left: 0) -->
    <label class="weave-switch weave-switch--content-right">
      <div id="switch-container-off" class="weave-switch__container">
        <input type="checkbox" class="weave-switch__input" />
        <span class="weave-switch__track"></span>
        <span id="thumb-off" class="weave-switch__thumb"></span>
      </div>
      <div id="switch-label" class="weave-switch__label">Off</div>
    </label>

    <!-- Checked switch: thumb at right (left: calc(100% - 20px) = 20px) -->
    <label class="weave-switch weave-switch--content-right" style="margin-top: 16px;">
      <div id="switch-container-on" class="weave-switch__container">
        <input type="checkbox" class="weave-switch__input" checked />
        <span class="weave-switch__track"></span>
        <span id="thumb-on" class="weave-switch__thumb"></span>
      </div>
    </label>

    <!-- Content Placement orientations -->
    <div style="margin-top: 32px;"></div>

    <!-- Right (row): label to the right of switch -->
    <label class="weave-switch weave-flex-row">
      <div id="cp-right-container" class="weave-switch__container">
        <input type="checkbox" class="weave-switch__input" />
        <span class="weave-switch__track"></span>
        <span class="weave-switch__thumb"></span>
      </div>
      <div id="cp-right-label" class="weave-switch__label">Right</div>
    </label>

    <div style="margin-top: 16px;"></div>

    <!-- Left (row-reverse): label to the left of switch -->
    <label class="weave-switch weave-flex-row-reverse">
      <div id="cp-left-container" class="weave-switch__container">
        <input type="checkbox" class="weave-switch__input" />
        <span class="weave-switch__track"></span>
        <span class="weave-switch__thumb"></span>
      </div>
      <div id="cp-left-label" class="weave-switch__label">Left</div>
    </label>

    <div style="margin-top: 16px;"></div>

    <!-- Bottom (column): label below switch -->
    <label class="weave-switch weave-flex-column">
      <div id="cp-bottom-container" class="weave-switch__container">
        <input type="checkbox" class="weave-switch__input" />
        <span class="weave-switch__track"></span>
        <span class="weave-switch__thumb"></span>
      </div>
      <div id="cp-bottom-label" class="weave-switch__label">Bottom</div>
    </label>

    <div style="margin-top: 16px;"></div>

    <!-- Top (column-reverse): label above switch -->
    <label class="weave-switch weave-flex-column-reverse">
      <div id="cp-top-container" class="weave-switch__container">
        <input type="checkbox" class="weave-switch__input" />
        <span class="weave-switch__track"></span>
        <span class="weave-switch__thumb"></span>
      </div>
      <div id="cp-top-label" class="weave-switch__label">Top</div>
    </label>
  </body>
</html>
