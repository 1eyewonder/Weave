<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dialog Fixture</title>
    <link rel="stylesheet" href="../../../src/Weave/styles.css" />
    <style>
      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <!-- Open, centered dialog with title, content, and actions -->
    <div id="dialog-open" class="weave-dialog weave-dialog--center">
      <div class="weave-dialog__backdrop"></div>
      <div id="dialog-window" class="weave-dialog__window" style="width: 400px;">
        <div id="dialog-title" class="weave-dialog__title">Dialog Title</div>
        <div id="dialog-content" class="weave-dialog__content">
          <p>Dialog body content goes here.</p>
        </div>
        <div id="dialog-actions" style="display: flex; justify-content: flex-end; padding: 8px 24px;">
          <button type="button">Cancel</button>
          <button type="button">OK</button>
        </div>
      </div>
    </div>

    <!-- Dialog with topcenter position -->
    <div id="dialog-topcenter" class="weave-dialog weave-dialog--topcenter" style="position: relative; height: 400px;">
      <div class="weave-dialog__backdrop"></div>
      <div id="dialog-topcenter-window" class="weave-dialog__window" style="width: 400px;">
        <div class="weave-dialog__title">Top Center Dialog</div>
        <div class="weave-dialog__content">Top center content</div>
      </div>
    </div>

    <!-- Bottom-center dialog -->
    <div id="dialog-bottomcenter" class="weave-dialog weave-dialog--bottomcenter">
      <div class="weave-dialog__backdrop"></div>
      <div id="dialog-window-bottomcenter" class="weave-dialog__window" style="width: 300px;">
        <div class="weave-dialog__title">Bottom Center</div>
        <div class="weave-dialog__content">Bottom center content.</div>
      </div>
    </div>

    <!-- Backdrop should cover its container -->
    <div id="dialog-backdrop-test" class="weave-dialog weave-dialog--center" style="position: relative; width: 800px; height: 600px;">
      <div id="dialog-backdrop" class="weave-dialog__backdrop"></div>
      <div class="weave-dialog__window" style="width: 300px;">
        <div class="weave-dialog__title">Backdrop Test</div>
        <div class="weave-dialog__content">Content</div>
      </div>
    </div>
  </body>
</html>
