<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button Fixture</title>
    <link rel="stylesheet" href="../../../src/Weave/styles.css" />
    <style>
      body {
        margin: 0;
        padding: 16px;
        box-sizing: border-box;
      }
      .full-width-container {
        width: 100vw;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <button id="btn-compact" class="weave-button weave-button--filled weave-density--compact">
      <span class="weave-button__label">Compact</span>
    </button>

    <button id="btn-standard" class="weave-button weave-button--filled weave-density--standard">
      <span class="weave-button__label">Standard</span>
    </button>

    <button id="btn-spacious" class="weave-button weave-button--filled weave-density--spacious">
      <span class="weave-button__label">Spacious</span>
    </button>

    <button id="btn-filled" class="weave-button weave-button--filled weave-density--standard">
      <span class="weave-button__label">Filled</span>
    </button>

    <button id="btn-outlined" class="weave-button weave-button--outlined weave-density--standard">
      <span class="weave-button__label">Outlined</span>
    </button>

    <button id="btn-text" class="weave-button weave-button--text weave-density--standard">
      <span class="weave-button__label">Text</span>
    </button>

    <button id="btn-icon" class="weave-button weave-button--filled weave-button--icon weave-density--standard">
      <span>×</span>
    </button>

    <div id="full-width-container" class="full-width-container">
      <button
        id="btn-full-width"
        class="weave-button weave-button--filled weave-button--full-width weave-density--standard"
      >
        <span class="weave-button__label">Full Width</span>
      </button>
    </div>

    <!-- Color variant buttons -->
    <button id="btn-primary" class="weave-button weave-button--filled weave-button--primary weave-density--standard">
      <span class="weave-button__label">Primary</span>
    </button>

    <button id="btn-error" class="weave-button weave-button--filled weave-button--error weave-density--standard">
      <span class="weave-button__label">Error</span>
    </button>

    <button id="btn-success" class="weave-button weave-button--filled weave-button--success weave-density--standard">
      <span class="weave-button__label">Success</span>
    </button>

    <button id="btn-outlined-primary" class="weave-button weave-button--outlined weave-button--primary weave-density--standard">
      <span class="weave-button__label">Outlined Primary</span>
    </button>

    <!-- Disabled buttons -->
    <button id="btn-disabled" class="weave-button weave-button--filled weave-button--disabled weave-density--standard" disabled>
      <span class="weave-button__label">Disabled</span>
    </button>

    <button id="btn-disabled-outlined" class="weave-button weave-button--outlined weave-button--disabled weave-density--standard" disabled>
      <span class="weave-button__label">Disabled Outlined</span>
    </button>
  </body>
</html>
