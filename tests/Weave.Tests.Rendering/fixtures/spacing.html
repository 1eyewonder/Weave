<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spacing Fixture</title>
    <link rel="stylesheet" href="../../../src/Weave/styles.css" />
    <style>
      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .box {
        height: 20px;
        width: 100px;
        background: #ccc;
      }
    </style>
  </head>
  <body>
    <!-- Basic margin-top -->
    <div id="margin-mt-4" class="weave-mt-4 box">mt-4</div>
    <div id="margin-mt-0" class="weave-mt-0 box">mt-0</div>
    <div id="margin-mt-20" class="weave-mt-20 box">mt-20</div>

    <!-- Individual direction margins -->
    <div id="margin-all-sides" class="weave-mt-2 weave-mr-4 weave-mb-8 weave-ml-12 box">all sides</div>

    <!-- Margin shorthands -->
    <div id="margin-mx-4" class="weave-mx-4 box">mx-4</div>
    <div id="margin-my-8" class="weave-my-8 box">my-8</div>
    <div id="margin-ma-2" class="weave-ma-2 box">ma-2</div>

    <!-- Padding -->
    <div id="padding-pt-4" class="weave-pt-4">pt-4</div>
    <div id="padding-px-8" class="weave-px-8">px-8</div>
    <div id="padding-py-4" class="weave-py-4">py-4</div>
    <div id="padding-pa-2" class="weave-pa-2">pa-2</div>

    <!-- Auto margin centering -->
    <div style="width: 400px;">
      <div id="margin-mx-auto" class="weave-mx-auto" style="width: 100px; height: 20px; background: #ccc;">centered</div>
    </div>

    <!-- Responsive margin: mt-0 at xs, mt-8 at sm (>=600px) -->
    <div id="resp-margin" class="weave-mt-0 weave-mt-sm-8 box">responsive mt</div>

    <!-- Responsive padding: pt-0 at xs, pt-4 at md (>=960px) -->
    <div id="resp-padding" class="weave-pt-0 weave-pt-md-4">responsive pt</div>
  </body>
</html>
