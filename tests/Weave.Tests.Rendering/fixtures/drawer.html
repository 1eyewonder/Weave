<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drawer Fixture</title>
    <link rel="stylesheet" href="../../../src/Weave/styles.css" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        box-sizing: border-box;
      }
      /* Provide drawer width variables since they come from the theme */
      :root {
        --drawer-width-left: 256px;
        --drawer-width-right: 256px;
        --zindex-drawer: 100;
        --zindex-appbar: 200;
        --palette-drawer-text: #333;
        --palette-drawer-background: #fff;
      }
    </style>
  </head>
  <body>
    <div id="drawer-container" class="weave-drawer-container weave-drawer-container--open-persistent weave-drawer-container--side-left" style="height: 100%;">
      <!-- Open persistent left drawer -->
      <aside id="drawer-left" class="weave-drawer weave-drawer--persistent weave-drawer--pos-left weave-drawer--open weave-drawer--initial">
        <div id="drawer-content" class="weave-drawer__content">
          <nav>
            <ul>
              <li>Item 1</li>
              <li>Item 2</li>
              <li>Item 3</li>
            </ul>
          </nav>
        </div>
      </aside>

      <!-- Main content -->
      <div id="main-content" class="weave-drawer-container__main">
        <div class="weave-main-content" style="padding: 16px;">
          <h1>Main Content</h1>
          <p>This is the main content area next to the drawer.</p>
        </div>
      </div>
    </div>

    <!-- Closed drawer (should be transformed off-screen or have 0 width) -->
    <div id="drawer-closed-container" class="weave-drawer-container weave-drawer-container--side-left" style="height: 300px; position: relative; margin-top: 16px;">
      <aside id="drawer-closed" class="weave-drawer weave-drawer--persistent weave-drawer--pos-left weave-drawer--closed weave-drawer--initial">
        <div class="weave-drawer__content">
          <nav><ul><li>Hidden Item</li></ul></nav>
        </div>
      </aside>
      <div class="weave-drawer-container__main">
        <div class="weave-main-content" style="padding: 16px;">Closed drawer main content</div>
      </div>
    </div>

    <!-- Right-side drawer -->
    <div id="drawer-right-container" class="weave-drawer-container weave-drawer-container--open-persistent weave-drawer-container--side-right" style="height: 300px; position: relative; margin-top: 16px;">
      <aside id="drawer-right" class="weave-drawer weave-drawer--persistent weave-drawer--pos-right weave-drawer--open weave-drawer--initial">
        <div class="weave-drawer__content">
          <nav><ul><li>Right Item</li></ul></nav>
        </div>
      </aside>
      <div class="weave-drawer-container__main">
        <div class="weave-main-content" style="padding: 16px;">Right drawer main content</div>
      </div>
    </div>
  </body>
</html>
