<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropdown Fixture</title>
    <link rel="stylesheet" href="../../../src/Weave/styles.css" />
    <style>
      body {
        margin: 0;
        padding: 16px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <!-- Open dropdown with items -->
    <div id="dropdown-open" class="weave-dropdown weave-dropdown--open">
      <button type="button">Menu</button>
      <div id="dropdown-list" class="weave-dropdown__list">
        <div id="dropdown-item-1" class="weave-dropdown__item">
          <span class="weave-dropdown__item-text">Item One</span>
        </div>
        <div id="dropdown-item-2" class="weave-dropdown__item">
          <span class="weave-dropdown__item-text">Item Two</span>
        </div>
        <div id="dropdown-item-3" class="weave-dropdown__item">
          <span class="weave-dropdown__item-text">Item Three</span>
        </div>
      </div>
    </div>

    <!-- Dropdown with divider and disabled item -->
    <div id="dropdown-divider" class="weave-dropdown weave-dropdown--open" style="margin-top: 200px;">
      <button type="button">Actions</button>
      <div id="dropdown-divider-list" class="weave-dropdown__list">
        <div class="weave-dropdown__item">
          <span class="weave-dropdown__item-text">Edit</span>
        </div>
        <div class="weave-dropdown__divider"></div>
        <div class="weave-dropdown__item weave-dropdown__item--disabled">
          <span class="weave-dropdown__item-text">Delete</span>
        </div>
      </div>
    </div>
  </body>
</html>
