<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tooltip Fixture</title>
    <link rel="stylesheet" href="../../../src/Weave/styles.css" />
    <style>
      body {
        margin: 0;
        padding: 100px;
        box-sizing: border-box;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <!-- Tooltip root with forced-visible tooltip (default, top-center) -->
    <div id="tooltip-root" class="weave-tooltip-root" style="display: inline-block;">
      <button id="tooltip-trigger" type="button">Hover me</button>
      <div
        id="tooltip-top-center"
        class="weave-tooltip weave-tooltip--default weave-tooltip--top-center"
        style="display: flex;"
      >
        Top center tooltip
      </div>
    </div>

    <!-- Tooltip with arrow -->
    <div id="tooltip-root-arrow" class="weave-tooltip-root" style="display: inline-block; margin-left: 200px;">
      <button type="button">With arrow</button>
      <div
        id="tooltip-arrow"
        class="weave-tooltip weave-tooltip--default weave-tooltip--top-center weave-tooltip--arrow"
        style="display: flex;"
      >
        Arrow tooltip
      </div>
    </div>

    <!-- Bottom-center tooltip -->
    <div id="tooltip-root-bottom" class="weave-tooltip-root" style="display: inline-block; margin-top: 80px;">
      <button id="tooltip-trigger-bottom" type="button">Bottom</button>
      <div
        id="tooltip-bottom-center"
        class="weave-tooltip weave-tooltip--default weave-tooltip--bottom-center"
        style="display: flex;"
      >
        Bottom center tooltip
      </div>
    </div>
  </body>
</html>
