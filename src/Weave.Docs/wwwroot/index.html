<!doctype html>
<html lang="en">
  <head>
    <title>Weave Docs</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="Scripts/styles.css" />
    <style>
      /* Don't show the not-yet-loaded templates */
      [ws-template],
      [ws-children-template] {
        display: none;
      }
    </style>
    <script type="text/javascript" src="Scripts/Weave.Docs.head.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/default.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/fsharp.min.js"></script>

    <!-- We need to be able to call highlighting after rendering due to WebSharper mechanics -->
    <script>
      window.highlightCodeElement = function (element) {
        if (window.hljs && element) {
          window.hljs.highlightElement(element);
        }
      };
    </script>

    <!-- Here we are overwriting highlight.js's styling to make it blend in with our styling better -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }

      #main {
        height: 100%;
      }

      .hljs {
        background: var(--palette-background-darken);
        color: var(--palette-text-primary);
        font-family: var(--weave-font-family);
      }
      .hljs-string {
        color: var(--palette-secondary);
      }
      .hljs-operator {
        color: var(--palette-primary);
      }
      .hljs-keyword {
        color: var(--palette-tertiary);
      }
      .hljs-type {
        color: var(--palette-tertiary);
      }
      .hljs-built_in {
        color: var(--palette-primary);
      }
      .hljs-literal {
        color: var(--palette-secondary);
      }
      .hljs-comment {
        color: var(--palette-success);
      }

      /* Anchor links in section headers */
      .anchor-link {
        opacity: 0;
        transition: opacity 0.2s ease;
      }
      .section-header:hover .anchor-link {
        opacity: 0.7;
      }
      .anchor-link:hover {
        opacity: 1 !important;
      }

      /* Component card hover effect on home page */
      .docs-component-card {
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }
      .docs-component-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
      }

      /* Active nav leaf item */
      .weave-nav-item--active {
        background: var(--palette-primary) !important;
        color: var(--palette-primary-text) !important;
      }

      /* Hover on nav leaf items */
      .weave-nav-leaf:hover:not(.weave-nav-item--active) {
        background: var(--palette-surface);
      }

      /* Hover on nav group headers */
      .weave-nav-group-header:hover {
        background: var(--palette-surface);
        border-radius: 6px;
      }

      /* transform creates a new containing block so position:fixed children
         (e.g. demo AppBars inside examples) are clipped to this panel
         rather than the viewport, preventing them from escaping it. */
      .weave-drawer-container__main {
        transform: translateZ(0);
      }

      /* ─── Component card preview illustrations ─── */
      .cp {
        height: 88px;
        position: relative;
        overflow: hidden;
        background: var(--palette-background-darken, var(--palette-background));
        border-bottom: 1px solid rgba(128, 128, 128, 0.12);
        flex-shrink: 0;
      }
      .cp > * {
        position: absolute;
        box-sizing: border-box;
      }
      /* shape atoms */
      .cp-bar {
        background: var(--palette-primary);
      }
      .cp-bar2 {
        background: var(--palette-secondary);
      }
      .cp-line {
        background: var(--palette-text-primary);
        opacity: 0.18;
        border-radius: 1px;
      }
      .cp-pill {
        background: var(--palette-primary);
        border-radius: 10px;
      }
      .cp-box {
        border: 2px solid var(--palette-primary);
        border-radius: 4px;
      }
      .cp-fill {
        background: var(--palette-surface);
        border-radius: 3px;
      }
      .cp-fdim {
        background: var(--palette-text-primary);
        opacity: 0.07;
      }
      .cp-dot {
        background: var(--palette-primary);
        border-radius: 50%;
      }
      .cp-ring {
        border: 2px solid var(--palette-primary);
        border-radius: 50%;
      }
      .cp > span {
        display: block;
        line-height: 1;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="main"></div>
    <script type="module" src="Scripts/Weave.Docs.min.js"></script>
  </body>
</html>
